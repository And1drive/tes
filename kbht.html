<!--
Aplikasi Arisan - Single file web app (index.html)
+ Google Apps Script backend (Code.gs) included below.

Cara pakai singkat:
1) Buat Google Spreadsheet baru. Buat sheet: "Users", "MasterData", "DataInput", "Pengeluaran".
2) Masukkan header (baris 1) pada tiap sheet sesuai petunjuk di bagian GAS.
3) Buat Google Apps Script project, ganti CONTENT_SPREADSHEET_ID pada Code.gs dengan ID spreadsheet Anda, paste Code.gs, simpan.
4) Deploy > New deployment > type: Web app. Access: Anyone (atau hanya domain). Execute as: Me. Salin URL web app.
5) Pada index.html ganti `const scriptURL = "PASTE_YOUR_WEBAPP_URL_HERE";`
6) Buka index.html di server statis atau double-click (modern browsers block some fetch() from file:// — sebaiknya pakai Live Server atau hosting). Untuk akses dari mana saja, host index.html (GitHub Pages, Firebase Hosting, Netlify) atau gunakan Google Drive hosting yang sesuai.

Default user admin:
- username: admin
- password: admin123

NOTE: Untuk produksi, gunakan HTTPS hosting, dan atur izin spreadsheet dengan benar.
-->

<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aplikasi Arisan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1724; /* dark navy */
      --card:#0b1220;
      --accent:#7c3aed; /* purple */
      --accent-2:#06b6d4; /* teal */
      --muted:#98a0ad;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    html,body{height:100%;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;background:linear-gradient(180deg,#061226 0%, #071a2a 100%);color:#e6eef8;margin:0}
    .container{max-width:1100px;margin:28px auto;padding:18px}
    .card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 6px 30px rgba(2,6,23,0.6);}

    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    header h1{font-size:20px;margin:0}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800}

    /* Layout */
    .grid{display:grid;grid-template-columns:280px 1fr;gap:16px}
    nav{padding:12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent)}
    nav .menu{display:flex;flex-direction:column;gap:6px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.03);cursor:pointer}
    .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white;border:none}
    .muted{color:var(--muted);font-size:13px}

    /* Forms */
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    input[type=text],select,input[type=number],input[type=password],input[type=date]{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:var(--glass);color:inherit}
    .row{display:flex;gap:12px}
    .col{flex:1}
    .small{width:120px}

    /* Table */
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px dashed rgba(255,255,255,0.03);text-align:left}
    th{font-size:13px;color:var(--muted)}

    /* Responsive */
    @media(max-width:880px){.grid{grid-template-columns:1fr}.logo{width:38px;height:38px}}

    /* Login modal */
    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(2,6,23,0.6),rgba(2,6,23,0.85))}
    .hidden{display:none}

    /* Tiny helpers */
    .right{text-align:right}
    .center{text-align:center}
    .mt12{margin-top:12px}
    .flex{display:flex}
    .gap8{gap:8px}
    .chip{padding:6px 8px;border-radius:999px;background:rgba(255,255,255,0.03);font-size:12px}

    footer{margin-top:14px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="modal" id="loginModal">
    <div class="card" style="width:420px;">
      <div class="brand" style="margin-bottom:12px">
        <div class="logo">AR</div>
        <div>
          <h2 style="margin:0">Aplikasi Arisan</h2>
          <div class="muted">Masuk untuk mengakses aplikasi</div>
        </div>
      </div>
      <div>
        <label>Username</label>
        <input id="loginUsername" type="text" placeholder="masukkan username">
        <label class="mt12">Password</label>
        <input id="loginPassword" type="password" placeholder="masukkan password">
        <div class="row mt12">
          <button class="btn primary" id="btnLogin">Login</button>
          <button class="btn" id="btnGuest">Masuk Sebagai Tamu</button>
        </div>
        <div class="muted mt12">Default administrator: admin / admin123</div>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="brand">
        <div class="logo">AR</div>
        <div>
          <h1>Aplikasi Arisan</h1>
          <div class="muted">Sistem arisan sederhana — responsive & modern</div>
        </div>
      </div>
      <div id="userInfo" class="muted">Belum login</div>
    </header>

    <div class="grid">
      <nav class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong>Menu</strong>
          <button class="btn" id="btnLogout">Logout</button>
        </div>
        <div class="menu">
          <button class="btn" id="menuInput">1. Input Data</button>
          <button class="btn" id="menuPengeluaran">2. Pengeluaran</button>
          <button class="btn" id="menuLaporan">3. Laporan</button>
          <div style="height:1px;background:rgba(255,255,255,0.02);margin:8px 0"></div>
          <button class="btn" id="menuAdmin">Administrator</button>
        </div>
      </nav>

      <main id="mainPanel">
        <!-- content loaded by JS -->
      </main>
    </div>

    <footer class="center muted">© Aplikasi Arisan — dibuat responsive. Simpan data ke Google Sheets.</footer>
  </div>

  <script>
  /***** CONFIG - GANTI DENGAN DEPLOYED WEBAPP URL Google Apps Script *****/
  const scriptURL = "https://script.google.com/macros/s/AKfycbwyTS2UYCNuIRVp10XWeeoGnSisLjLGaytgF-FC_n2e5wn2g7HbCCN6PE3cvPoGa7NI/exec"; // example: https://script.google.com/macros/s/AKfycbx.../exec

  /***** STATE *****/
  let state = {user:null, users:[], master:[], dataInput:[], pengeluaran:[]};

  /***** UTILITIES *****/
  function $id(id){return document.getElementById(id)}
  function fmtMoney(n){
    if(n==null||n==='') return '';
    const x = Number(String(n).replace(/\D/g,''))||0;
    return x.toLocaleString('id-ID');
  }
  function parseMoney(s){return Number(String(s).replace(/\D/g,''))||0}

  function showNotification(text,ok=true){
    const el = document.createElement('div');
    el.textContent = text; el.style.position='fixed'; el.style.right='18px'; el.style.bottom='18px'; el.style.padding='10px 14px'; el.style.borderRadius='8px';
    el.style.background = ok? 'linear-gradient(90deg,var(--accent),var(--accent-2))' : 'rgba(220,60,60,0.9)'; el.style.color='white'; el.style.boxShadow='0 6px 20px rgba(2,6,23,0.6)';
    document.body.appendChild(el); setTimeout(()=>el.remove(),2300);
  }

  async function api(action,payload={}){
    try{
      const body = Object.assign({}, payload, {action});
      const res = await fetch(scriptURL, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body) });
      if(!res.ok) throw new Error('HTTP '+res.status);
      return await res.json();
    }catch(err){
      console.error(err); showNotification('Koneksi gagal: '+err.message,false); throw err;}
  }

  /***** BOOT & SYNC *****/
  async function loadAll(){
    // load users, master list, data input, pengeluaran
    try{
      const [users, master, dataInput, pengeluaran] = await Promise.all([
        api('readUsers'), api('readMaster'), api('readInputs'), api('readPengeluaran')
      ]);
      state.users = users||[]; state.master = master||[]; state.dataInput = dataInput||[]; state.pengeluaran = pengeluaran||[];
      console.log('sync',state);
    }catch(e){console.warn('sync error',e)}
  }

  /***** AUTH *****/
  async function doLogin(username,password){
    // simple local check against loaded users
    await loadAll();
    const u = state.users.find(x=>x.username===username && x.password===password);
    if(!u) return false;
    state.user = u; sessionStorage.setItem('arisan_user', JSON.stringify(u)); document.getElementById('loginModal').classList.add('hidden');
    $id('userInfo').textContent = `Hi, ${u.fullname || u.username}`;
    renderMain();
    return true;
  }

  function checkSession(){
    const s = sessionStorage.getItem('arisan_user');
    if(s){state.user = JSON.parse(s); document.getElementById('loginModal').classList.add('hidden'); $id('userInfo').textContent = `Hi, ${state.user.fullname || state.user.username}`;}
  }

  async function logout(){sessionStorage.removeItem('arisan_user'); state.user=null; document.getElementById('loginModal').classList.remove('hidden'); $id('userInfo').textContent='Belum login';}

  /***** ADMIN UI (manage users) *****/
  function renderAdmin(){
    const can = state.user && (state.user.role === 'admin');
    const h = [];
    h.push(`<div class="card"><h3>Admin — Pengaturan User</h3>`);
    if(!can) h.push(`<div class="muted">Hanya admin yang bisa melihat pengaturan user.</div>`);
    h.push(`<div style="margin-top:12px">`);
    h.push(`<div style="display:flex;gap:8px"><input id="u_username" placeholder="username"> <input id="u_fullname" placeholder="nama lengkap"> <input id="u_password" placeholder="password"> <button class="btn primary" id="btnAddUser">Tambah</button></div>`);
    h.push(`<div style="margin-top:12px"><table><thead><tr><th>User</th><th>Nama</th><th>Role</th><th>Permission</th><th></th></tr></thead><tbody id="usersTable"></tbody></table></div>`);
    h.push(`</div></div>`);
    $id('mainPanel').innerHTML = h.join('');
    // populate
    const tbody = $id('usersTable'); tbody.innerHTML='';
    state.users.forEach(u=>{
      const perms = ['open','insert','update','delete'].map(p=>`<label style="margin-right:6px"><input type=checkbox ${u.perms && u.perms.includes(p)?'checked':''} data-user="${u.username}" data-perm="${p}"> ${p}</label>`).join('');
      const row = document.createElement('tr'); row.innerHTML = `<td>${u.username}</td><td>${u.fullname||''}</td><td>${u.role||'user'}</td><td>${perms}</td><td><button class="btn" data-usr="${u.username}" onclick="onDeleteUser('${u.username}')">Hapus</button></td>`;
      tbody.appendChild(row);
    });
    $id('btnAddUser').addEventListener('click',async()=>{
      const username = $id('u_username').value.trim(); const fullname = $id('u_fullname').value.trim(); const password = $id('u_password').value.trim();
      if(!username||!password){showNotification('Username dan password wajib',false);return}
      await api('addUser',{username,fullname,password,role:'user',perms:['open','insert']});
      await loadAll(); renderAdmin(); showNotification('User ditambahkan');
    });
    // attach perm checkboxes
    tbody.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',async(e)=>{
      const username = e.target.dataset.user; const perm = e.target.dataset.perm; const checked = e.target.checked;
      await api('setUserPerm',{username,perm,checked}); await loadAll(); showNotification('Permission diperbarui');
    }));
  }

  async function onDeleteUser(username){ if(!confirm('Hapus user '+username+' ?')) return; await api('deleteUser',{username}); await loadAll(); renderAdmin(); showNotification('User dihapus'); }

  /***** INPUT DATA UI *****/
  function renderInput(){
    const selectedReceiver = localStorage.getItem('arisan_selected_receiver') || '';
    const curMonth = new Date().getMonth()+1; const curYear = new Date().getFullYear();
    const h=[];
    h.push(`<div class="card"><h3>Input Data</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">`);
    // Left
    h.push(`<div><label>Penerima</label><select id="inp_penerima"><option value="">-- pilih penerima --</option>${state.master.map(m=>`<option ${m.name===selectedReceiver?'selected':''} value="${m.name}">${m.name}</option>`).join('')}</select><div class="mt12"><label>Bulan</label><select id="inp_bulan">${[...Array(12)].map((_,i)=>`<option value="${i+1}" ${i+1===curMonth?'selected':''}>${i+1}</option>`).join('')}</select></div><div class="mt12"><label>Tahun</label><select id="inp_tahun">${[...Array(6)].map((_,i)=>`<option value="${curYear-i}" ${i===0?'selected':''}>${curYear-i}</option>`).join('')}</select></div></div>`);
    // Center
    h.push(`<div><label>Penyetor</label><select id="inp_penyetor"><option value="">-- pilih penyetor --</option>${state.master.map(m=>`<option value="${m.name}">${m.name}</option>`).join('')}</select>
    <div class="mt12"><label>Jumlah Disetor</label><input id="inp_jumlah" type="text" placeholder="0"></div>
    <div class="mt12 row"><div class="col"><label>Kas Untuk Penerima</label><input id="inp_penerima_kas" type="text" placeholder="0"></div><div class="col"><label>Kas Untuk Panitia</label><input id="inp_panitia_kas" type="text" placeholder="0"></div></div>
    <div class="mt12"><label>Metode Pembayaran</label><label><input type=checkbox id="pay_cash"> Cash</label> <label><input type=checkbox id="pay_transfer"> Transfer</label></div>
    <div class="mt12 row"><button class="btn primary" id="btnSaveInput">Simpan</button><button class="btn" id="btnBackMain">Kembali</button></div>
    </div>`);
    h.push(`</div></div>`);
    $id('mainPanel').innerHTML = h.join('');
    // format events
    document.getElementById('inp_jumlah').addEventListener('blur',e=>e.target.value = fmtMoney(e.target.value));
    document.getElementById('inp_penerima_kas').addEventListener('blur',e=>e.target.value = fmtMoney(e.target.value));
    document.getElementById('inp_panitia_kas').addEventListener('blur',e=>e.target.value = fmtMoney(e.target.value));
    $id('btnSaveInput').addEventListener('click', async ()=>{
      const penerima = $id('inp_penerima').value; if(!penerima){showNotification('Pilih penerima',false);return}
      const penyetor = $id('inp_penyetor').value; if(!penyetor){showNotification('Pilih penyetor',false);return}
      const bulan = $id('inp_bulan').value; const tahun = $id('inp_tahun').value;
      const jumlah = parseMoney($id('inp_jumlah').value); const kas_penerima = parseMoney($id('inp_penerima_kas').value); const kas_panitia = parseMoney($id('inp_panitia_kas').value);
      const metode = [];
      if($id('pay_cash').checked) metode.push('Cash'); if($id('pay_transfer').checked) metode.push('Transfer');
      const record = {penerima,penyetor,bulan,tahun,jumlah,kas_penerima,kas_panitia,metode,created: new Date().toISOString()};
      // push to UI first
      state.dataInput.unshift(record); renderToastSave();
      // store on server
      await api('addInput', record);
      localStorage.setItem('arisan_selected_receiver', penerima);
      await loadAll(); renderInput(); showNotification('Data berhasil disimpan');
    });
    $id('btnBackMain').addEventListener('click',()=>renderMain());
  }

  function renderToastSave(){
    // optional immediate UI feedback (could show small table preview)
  }

  /***** PENGELUARAN UI *****/
  function renderPengeluaran(){
    const h=[]; h.push(`<div class="card"><h3>Pengeluaran</h3><div style="margin-top:12px"><label>Tanggal</label><input id="exp_tgl" type="date" value="${new Date().toISOString().slice(0,10)}"><label class="mt12">Keterangan</label><input id="exp_ket" type="text"><label class="mt12">Nominal</label><input id="exp_nom" type="text"></div><div class="mt12 row"><button class="btn primary" id="btnSaveExp">Simpan</button><button class="btn" id="btnBackMain2">Kembali</button></div></div>`);
    $id('mainPanel').innerHTML = h.join('');
    $id('exp_nom').addEventListener('blur',e=>e.target.value = fmtMoney(e.target.value));
    $id('btnSaveExp').addEventListener('click',async()=>{
      const tanggal = $id('exp_tgl').value; const ket = $id('exp_ket').value; const nom = parseMoney($id('exp_nom').value);
      if(!tanggal||!ket||!nom){showNotification('Lengkapi data',false);return}
      const rec = {tanggal,ket,nominal:nom,created:new Date().toISOString()};
      state.pengeluaran.unshift(rec);
      await api('addPengeluaran',rec);
      await loadAll(); renderPengeluaran(); showNotification('Data pengeluaran tersimpan');
    });
    $id('btnBackMain2').addEventListener('click',()=>renderMain());
  }

  /***** LAPORAN UI *****/
  function renderLaporanMenu(){
    const h=[]; h.push(`<div class="card"><h3>Laporan</h3><div class="row mt12 gap8"><button class="btn" id="lapArisan">Laporan Arisan</button><button class="btn" id="lapPanitia">Laporan Kas Panitia</button><button class="btn" id="lapPengeluaran">Laporan Pengeluaran</button></div><div class="mt12"><button class="btn" id="btnBackMain3">Kembali</button></div></div>`);
    $id('mainPanel').innerHTML = h.join('');
    $id('lapArisan').addEventListener('click',()=>renderLaporanArisan());
    $id('lapPanitia').addEventListener('click',()=>renderLaporanPanitia());
    $id('lapPengeluaran').addEventListener('click',()=>renderLaporanPengeluaran());
    $id('btnBackMain3').addEventListener('click',()=>renderMain());
  }

  function renderLaporanArisan(){
    const penerima = localStorage.getItem('arisan_selected_receiver')||'';
    const h=[]; h.push(`<div class="card"><h3>Laporan Arisan</h3><div style="display:flex;gap:12px;align-items:end"><div style="flex:1"><label>Penerima</label><select id="lap_penerima"><option value="">-- pilih --</option>${state.master.map(m=>`<option value="${m.name}" ${m.name===penerima?'selected':''}>${m.name}</option>`).join('')}</select></div><div><label>Bulan</label><select id="lap_bulan"></select></div><div><label>Tahun</label><select id="lap_tahun"></select></div></div><div id="lap_table"></div><div class="mt12 row"><button class="btn" id="btnPrintArisan">Print / PDF</button> <button class="btn" id="btnBackL1">Kembali</button></div></div>`);
    $id('mainPanel').innerHTML = h.join('');
    const select = $id('lap_penerima'); select.addEventListener('change',()=>renderArisanTable());
    function populateMonthsYears(){
      const pener = select.value||penerima; const rows = state.dataInput.filter(r=>r.penerima===pener);
      const months = [...new Set(rows.map(r=>String(r.bulan)))].sort(); const years = [...new Set(rows.map(r=>String(r.tahun)))].sort();
      $id('lap_bulan').innerHTML = months.map(m=>`<option value="${m}">${m}</option>`).join('');
      $id('lap_tahun').innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join('');
    }
    populateMonthsYears(); renderArisanTable();
    async function renderArisanTable(){
      const pener = $id('lap_penerima').value || penerima; const bulan = $id('lap_bulan').value; const tahun = $id('lap_tahun').value;
      const rows = state.dataInput.filter(r=>r.penerima===pener && (!bulan || String(r.bulan)===String(bulan)) && (!tahun || String(r.tahun)===String(tahun)));
      const total_disetor = rows.reduce((s,r)=>s+Number(r.jumlah||0),0);
      const total_penerima = rows.reduce((s,r)=>s+Number(r.kas_penerima||0),0);
      const html = [`<table><thead><tr><th>Penyetor</th><th>Jumlah Disetor</th><th>Kas Untuk Penerima</th><th>Tanggal Input</th></tr></thead><tbody>`];
      rows.forEach(r=>html.push(`<tr><td>${r.penyetor}</td><td>${fmtMoney(r.jumlah)}</td><td>${fmtMoney(r.kas_penerima)}</td><td>${(new Date(r.created)).toLocaleString()}</td></tr>`));
      html.push(`</tbody></table>`);
      html.push(`<div class="mt12 right"><div>Total Disetor: <strong>${fmtMoney(total_disetor)}</strong></div><div>Total Kas Penerima: <strong>${fmtMoney(total_penerima)}</strong></div><div>Total Keseluruhan: <strong>${fmtMoney(total_disetor+total_penerima)}</strong></div></div>`);
      $id('lap_table').innerHTML = html.join('');
    }
    $id('btnPrintArisan').addEventListener('click',()=>window.print());
    $id('btnBackL1').addEventListener('click',()=>renderLaporanMenu());
  }

  function renderLaporanPanitia(){
    const rows = state.dataInput;
    const grouped = {};
    rows.forEach(r=>{
      const key = r.penerima+'|'+r.bulan+'|'+r.tahun;
      if(!grouped[key]) grouped[key]={penerima:r.penerima,bulan:r.bulan,tahun:r.tahun,penyetor:[],total:0};
      grouped[key].penyetor.push(r.penyetor);
      grouped[key].total += Number(r.kas_panitia||0);
    });
    const list = Object.values(grouped);
    const html = [`<div class="card"><h3>Laporan Kas Untuk Panitia</h3><table><thead><tr><th>Penerima</th><th>Bulan</th><th>Penyetor</th><th>Kas Untuk Panitia</th></tr></thead><tbody>`];
    list.forEach((g,i)=>html.push(`<tr><td>${g.penerima}</td><td>${g.bulan}/${g.tahun}</td><td>${g.penyetor.join(', ')}</td><td>${fmtMoney(g.total)}</td></tr>`));
    const total = list.reduce((s,g)=>s+g.total,0);
    html.push(`</tbody></table><div class="mt12 right">Total Kas Untuk Panitia: <strong>${fmtMoney(total)}</strong></div><div class="mt12 row"><button class="btn" onclick="window.print()">Print / PDF</button><button class="btn" onclick="renderLaporanMenu()">Kembali</button></div></div>`);
    $id('mainPanel').innerHTML = html.join('');
  }

  function renderLaporanPengeluaran(){
    const rows = state.pengeluaran;
    const html = [`<div class="card"><h3>Laporan Pengeluaran</h3><table><thead><tr><th>No</th><th>Tanggal</th><th>Keterangan</th><th>Nominal</th></tr></thead><tbody>`];
    rows.forEach((r,i)=>html.push(`<tr><td>${i+1}</td><td>${r.tanggal}</td><td>${r.ket}</td><td>${fmtMoney(r.nominal)}</td></tr>`));
    const total = rows.reduce((s,r)=>s+Number(r.nominal||0),0);
    html.push(`</tbody></table><div class="mt12 right">Total Pengeluaran: <strong>${fmtMoney(total)}</strong></div><div class="mt12 row"><button class="btn" onclick="window.print()">Print / PDF</button><button class="btn" onclick="renderLaporanMenu()">Kembali</button></div></div>`);
    $id('mainPanel').innerHTML = html.join('');
  }

  /***** MAIN MENU *****/
  function renderMain(){
    const h=[]; h.push(`<div class="card"><h3>Beranda</h3><div style="display:flex;gap:12px;margin-top:12px"><div class="col"><div class="chip">Data Input: ${state.dataInput.length}</div></div><div class="col right"><button class="btn primary" onclick="renderInput()">Mulai Input Data</button></div></div></div>`);
    $id('mainPanel').innerHTML = h.join('');
  }

  /***** Event wiring for menu buttons (top-level) *****/
  document.getElementById('menuInput').addEventListener('click',()=>renderInput());
  document.getElementById('menuPengeluaran').addEventListener('click',()=>renderPengeluaran());
  document.getElementById('menuLaporan').addEventListener('click',()=>renderLaporanMenu());
  document.getElementById('menuAdmin').addEventListener('click',()=>renderAdmin());
  document.getElementById('btnLogout').addEventListener('click',()=>logout());

  // login handlers
  document.getElementById('btnLogin').addEventListener('click', async ()=>{
    const u = $id('loginUsername').value.trim(); const p = $id('loginPassword').value.trim();
    if(!u||!p){showNotification('Isi username & password',false);return}
    const ok = await doLogin(u,p);
    if(!ok) showNotification('Login gagal',false);
  });
  document.getElementById('btnGuest').addEventListener('click', async ()=>{ await loadAll(); document.getElementById('loginModal').classList.add('hidden'); renderMain(); });

  // on load
  (async function(){
    checkSession(); await loadAll(); if(state.user) renderMain(); else document.getElementById('loginModal').classList.remove('hidden');
  })();

  // expose renderInput for inline onclick
  window.renderInput = renderInput; window.renderLaporanMenu = renderLaporanMenu; window.renderLaporanPanitia = renderLaporanPanitia; window.renderLaporanPengeluaran = renderLaporanPengeluaran; window.renderAdmin = renderAdmin; window.renderMain = renderMain;
  </script>

// GANTI DENGAN SPREADSHEET ID ANDA
const CONTENT_SPREADSHEET_ID = 'PASTE_YOUR_SPREADSHEET_ID_HERE';

function getSS(){return SpreadsheetApp.openById(CONTENT_SPREADSHEET_ID);}

function doPost(e){
  try{
    const body = typeof e.postData.contents === 'string' ? JSON.parse(e.postData.contents) : e.postData.contents;
    const action = body.action;
    switch(action){
      case 'readUsers': return jsonOutput(readUsers());
      case 'readMaster': return jsonOutput(readMaster());
      case 'readInputs': return jsonOutput(readInputs());
      case 'readPengeluaran': return jsonOutput(readPengeluaran());
      case 'addUser': return jsonOutput(addUser(body));
      case 'deleteUser': return jsonOutput(deleteUser(body.username));
      case 'setUserPerm': return jsonOutput(setUserPerm(body));
      case 'addInput': return jsonOutput(addInput(body));
      case 'addPengeluaran': return jsonOutput(addPengeluaran(body));
      default: return jsonOutput({error:'unknown action '+action});
    }
  }catch(err){return jsonOutput({error:err.message});}
}

function jsonOutput(obj){return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);}

// USERS sheet structure (header row): username | fullname | password | role | perms (comma sep)
function readUsers(){
  const sh = getSS().getSheetByName('Users'); if(!sh) return [];
  const rows = sh.getDataRange().getValues();
  const header = rows.shift();
  return rows.map(r=>({username:r[0],fullname:r[1],password:String(r[2]||''),role:r[3]||'user',perms:(String(r[4]||'')).split(',').filter(Boolean)}));
}

function addUser(data){
  const sh = getSS().getSheetByName('Users'); if(!sh) sh = getSS().insertSheet('Users');
  // if sheet empty, set header
  if(sh.getLastRow()===0) sh.appendRow(['username','fullname','password','role','perms']);
  sh.appendRow([data.username||'',data.fullname||'',data.password||'',data.role||'user', (data.perms||[]).join(',')]);
  return {ok:true};
}

function deleteUser(username){
  const sh = getSS().getSheetByName('Users'); if(!sh) return {ok:false};
  const rows = sh.getDataRange().getValues();
  for(let i=1;i<rows.length;i++){if(rows[i][0]===username){sh.deleteRow(i+1);return {ok:true}}}
  return {ok:false};
}

function setUserPerm(body){
  const sh = getSS().getSheetByName('Users'); if(!sh) return {ok:false};
  const rows = sh.getDataRange().getValues();
  for(let i=1;i<rows.length;i++){
    if(rows[i][0]===body.username){
      const cur = String(rows[i][4]||'').split(',').filter(Boolean);
      const idx = cur.indexOf(body.perm);
      if(body.checked && idx===-1) cur.push(body.perm);
      if(!body.checked && idx>-1) cur.splice(idx,1);
      sh.getRange(i+1,5).setValue(cur.join(','));
      return {ok:true};
    }
  }
  return {ok:false};
}

// MASTER sheet: header: name
function readMaster(){
  const sh = getSS().getSheetByName('MasterData'); if(!sh) return [];
  const rows = sh.getDataRange().getValues(); rows.shift();
  return rows.map(r=>({name:r[0]}));
}

// DataInput sheet: header: penerima|penyetor|bulan|tahun|jumlah|kas_penerima|kas_panitia|metode|created
function readInputs(){
  const sh = getSS().getSheetByName('DataInput'); if(!sh) return [];
  const rows = sh.getDataRange().getValues(); const header = rows.shift();
  return rows.map(r=>({penerima:r[0],penyetor:r[1],bulan:r[2],tahun:r[3],jumlah:Number(r[4]||0),kas_penerima:Number(r[5]||0),kas_panitia:Number(r[6]||0),metode:r[7]?String(r[7]).split('|'):[],created:r[8]}));
}

function addInput(data){
  const sh = getSS().getSheetByName('DataInput'); if(!sh) sh = getSS().insertSheet('DataInput');
  if(sh.getLastRow()===0) sh.appendRow(['penerima','penyetor','bulan','tahun','jumlah','kas_penerima','kas_panitia','metode','created']);
  sh.appendRow([data.penerima,data.penyetor,data.bulan,data.tahun,Number(data.jumlah||0),Number(data.kas_penerima||0),Number(data.kas_panitia||0),(data.metode||[]).join('|'),data.created||new Date().toISOString()]);
  return {ok:true};
}

// Pengeluaran sheet: header: tanggal|keterangan|nominal|created
function readPengeluaran(){
  const sh = getSS().getSheetByName('Pengeluaran'); if(!sh) return [];
  const rows = sh.getDataRange().getValues(); rows.shift();
  return rows.map(r=>({tanggal:r[0],ket:r[1],nominal:Number(r[2]||0),created:r[3]}));
}

function addPengeluaran(data){
  const sh = getSS().getSheetByName('Pengeluaran'); if(!sh) sh = getSS().insertSheet('Pengeluaran');
  if(sh.getLastRow()===0) sh.appendRow(['tanggal','keterangan','nominal','created']);
  sh.appendRow([data.tanggal,data.ket,Number(data.nominal||0),data.created||new Date().toISOString()]);
  return {ok:true};
}

function onOpen(){
  const ss = getSS(); if(!ss.getSheetByName('Users')){const sh = ss.insertSheet('Users'); sh.appendRow(['username','fullname','password','role','perms']); sh.appendRow(['admin','Administrator','admin123','admin','open,insert,update,delete']);}
}
